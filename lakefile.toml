name = "hex-gram-schmidt-mathlib"
defaultTargets = ["HexGramSchmidtMathlib"]

# Keep these Hex pins in sync with their source repos: Lake does not reconcile
# a package pinned at two points in the graph, so bump them together.
[[require]]
name = "HexGramSchmidt"
git = "https://github.com/kim-em/hex-gram-schmidt.git"
rev = "06a3f01519eb93a466049156586efa1724c3a1ba"

[[require]]
name = "HexMatrixMathlib"
git = "https://github.com/kim-em/hex-matrix-mathlib.git"
rev = "7e2eed8ae6d962d11e65d5763ce93439ce3fcb72"

[[require]]
name = "HexMatrix"
git = "https://github.com/kim-em/hex-matrix.git"
rev = "20e4c73f958cf7996199972a45e538d06121f91f"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "HexGramSchmidtMathlib"
