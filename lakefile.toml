name = "hex-gram-schmidt-mathlib"
defaultTargets = ["HexGramSchmidtMathlib"]

# Keep these Hex pins in sync with their source repos: Lake does not reconcile
# a package pinned at two points in the graph, so bump them together.
[[require]]
name = "HexBasic"
git = "https://github.com/kim-em/hex-basic.git"
rev = "49d4eb822ce66aa14b18c2472c18848a2411792d"

[[require]]
name = "HexGramSchmidt"
git = "https://github.com/kim-em/hex-gram-schmidt.git"
rev = "4fd416d0ee1ad4b0bd002dcd75774a91e04c2355"

[[require]]
name = "HexBareissMathlib"
git = "https://github.com/kim-em/hex-bareiss-mathlib.git"
rev = "a939c4068a45b654bd9312d25ef0f0d4cd46922f"

[[require]]
name = "HexDeterminantMathlib"
git = "https://github.com/kim-em/hex-determinant-mathlib.git"
rev = "6c03715c299e5be6ac15960233a6a5c6d1c430e3"

[[require]]
name = "HexMatrixMathlib"
git = "https://github.com/kim-em/hex-matrix-mathlib.git"
rev = "ad3189f98d3bc9001b11b229b1b0304f8d284ace"

[[require]]
name = "HexRowReduce"
git = "https://github.com/kim-em/hex-row-reduce.git"
rev = "962bf360dd394acd319ab8f2d632d6809cbc1340"

[[require]]
name = "HexDeterminant"
git = "https://github.com/kim-em/hex-determinant.git"
rev = "7b9428bf69a29b70986bedccbdd4f92c8d982784"

[[require]]
name = "HexBareiss"
git = "https://github.com/kim-em/hex-bareiss.git"
rev = "25c67906f895d21a4de457407635bfd097356db7"

[[require]]
name = "HexMatrix"
git = "https://github.com/kim-em/hex-matrix.git"
rev = "a84b3d2bd4186eaebcabbffe0f8bae32b752eccb"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0-rc1-patch1"

[[lean_lib]]
name = "HexGramSchmidtMathlib"
